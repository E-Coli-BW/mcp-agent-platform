spring.application.name=completion-server

# ── Server (Netty, non-blocking) ─────────────────────────────
server.port=8600

# ── Ollama (default LLM backend) ─────────────────────────────
completion.ollama.base-url=http://localhost:11434
completion.ollama.model=qwen2.5-coder:7b
completion.ollama.timeout-ms=5000

# ── FIM ───────────────────────────────────────────────────────
completion.fim.max-prefix-lines=50
completion.fim.max-suffix-lines=20
completion.fim.max-tokens=128
completion.fim.temperature=0.2
completion.fim.stop-tokens=\\n\\n,def ,class ,public ,import 

# ── Cache ─────────────────────────────────────────────────────
completion.cache.max-size=2000
completion.cache.expire-minutes=5

# ── Debounce ──────────────────────────────────────────────────
completion.debounce.enabled=true

# ── Actuator / Metrics ────────────────────────────────────────
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=completion-server

mcp.security.jwt-secret=${JWT_SECRET:}
mcp.security.jwks-url=${JWKS_URL:http://auth-service:8090/auth/jwks}
