server.port=8090
spring.application.name=auth-service
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# H2 in-memory for dev (switch to PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console for dev debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# Kafka outbox (disabled by default)
outbox.kafka.enabled=false
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Redis (token blacklist + rate limiting, graceful degradation if unavailable)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# Disable Redis repository scanning — we use Redis as a cache (RedisTemplate),
# never as a repository store. Without this, Spring Data Redis re-scans all
# JPA repository interfaces and prints 6 noisy WARN-style INFO lines like:
#   "Spring Data Redis - Could not safely identify store assignment for
#    repository candidate interface AuthClientRepository..."
# Setting the base packages to an empty (non-existent) marker makes the Redis
# scanner find zero candidates and the noise goes away.
spring.data.redis.repositories.enabled=false

# Rate limiting
auth.rate-limit.login.max-attempts=20
auth.rate-limit.login.window-seconds=900
