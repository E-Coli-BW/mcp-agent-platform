# ═══════════════════════════════════════════════════════════════════
# Memory MCP Server — Enterprise MVP Configuration
# ═══════════════════════════════════════════════════════════════════

spring.application.name=memory-mcp-server

# ── MCP Server ────────────────────────────────────────────────────
spring.ai.mcp.server.name=memory-store-java-http
spring.ai.mcp.server.version=1.0.0

# ── Server ────────────────────────────────────────────────────────
server.port=8180
spring.threads.virtual.enabled=true

# ── Database (PostgreSQL for production) ──────────────────────────
# Default: H2 in-memory for development
spring.datasource.url=jdbc:h2:mem:memorydb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# Flyway: disabled for H2 dev (uses ddl-auto), enabled for PostgreSQL
spring.flyway.enabled=false

# ── Tenant Security ──────────────────────────────────────────────
# PostgreSQL Row-Level Security (only for PostgreSQL, not H2)
memory.security.rls.enabled=false

# Uncomment for PostgreSQL:
# spring.datasource.url=jdbc:postgresql://localhost:5432/memorydb
# spring.datasource.username=memory
# spring.datasource.password=${DB_PASSWORD}
# spring.datasource.driver-class-name=org.postgresql.Driver

# ── Redis ─────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.password=${REDIS_PASSWORD}

# ── Security ──────────────────────────────────────────────────────
mcp.security.jwt-secret=${JWT_SECRET:}

# ── Actuator ──────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=memory-mcp-server

# Health indicator policy:
# - Redis and Elasticsearch are OPTIONAL infrastructure (File backend is the
#   default). When they're down the server is still fully functional, so they
#   shouldn't drop /actuator/health to 503. Otherwise the agent-server's
#   `_check_backend()` probe rejects this service and silently disables
#   memory_* tools — which is exactly the silent degradation we're trying
#   to avoid (see tool_registry.py UnknownToolError).
# - We disable the Redis and Elasticsearch HealthIndicators. The dedicated
#   `/actuator/health/redis` and `/actuator/health/elasticsearch` are still
#   available for ops dashboards if those backends are explicitly opted into.
management.health.redis.enabled=false
management.health.elasticsearch.enabled=false

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.example.memoryserver=INFO
logging.level.AUDIT=INFO
# Separate audit log file
# logging.file.name=logs/memory-server.log

# ── Resilience4j ──────────────────────────────────────────────────
# Rate Limiter: 50 requests per second per tenant (applied at tool bridge)
resilience4j.ratelimiter.instances.toolBridge.limitForPeriod=50
resilience4j.ratelimiter.instances.toolBridge.limitRefreshPeriod=1s
resilience4j.ratelimiter.instances.toolBridge.timeoutDuration=500ms

# ── Circuit Breaker (memoryService) ───────────────────────────────
resilience4j.circuitbreaker.instances.memoryService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.memoryService.slidingWindowSize=20
resilience4j.circuitbreaker.instances.memoryService.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.memoryService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.memoryService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.memoryService.slidingWindowType=COUNT_BASED

# Retry: 2 retries with 200ms backoff for transient DB failures
resilience4j.retry.instances.memoryService.maxAttempts=3
resilience4j.retry.instances.memoryService.waitDuration=200ms
resilience4j.retry.instances.memoryService.retryExceptions=org.springframework.dao.TransientDataAccessException,java.sql.SQLTransientException
