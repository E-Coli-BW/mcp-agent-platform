# Integration test profile — H2 in-memory (no Docker required)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway: disable for H2 (ddl-auto handles schema)
spring.flyway.enabled=false

# Redis — disable for integration tests without Docker
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Disable security auto-config noise
spring.security.user.password=test

# Disable MCP server for tests
spring.ai.mcp.server.enabled=false

# Benchmark: higher rate limit to allow stress testing without artificial throttling
resilience4j.ratelimiter.instances.toolBridge.limitForPeriod=2000
resilience4j.ratelimiter.instances.toolBridge.limitRefreshPeriod=1s
resilience4j.ratelimiter.instances.toolBridge.timeoutDuration=5s

# Tomcat: increase thread pool for high concurrency benchmark
server.tomcat.threads.max=200
mcp.security.jwt-secret=test-secret-at-least-32-bytes-long!!
