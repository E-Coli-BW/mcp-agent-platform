# Docker integration test profile — runs against real PostgreSQL + Redis
# Used by: make test-integration, GitHub Actions CI

# PostgreSQL (from docker compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/memorydb
spring.datasource.username=memory
spring.datasource.password=memory-dev-password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway enabled (tests the real migration scripts)
spring.flyway.enabled=true
spring.flyway.clean-disabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Redis (from docker compose)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Security
spring.security.user.password=test
mcp.security.jwt-secret=docker-test-secret-at-least-32-bytes!!

# Disable MCP server
spring.ai.mcp.server.enabled=false
