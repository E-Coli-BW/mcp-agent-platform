# Docker Compose — local development environment
# Starts PostgreSQL + Redis alongside the Spring Boot app

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: memorydb
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory-dev-pwd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memorydb"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Uncomment to run the app in Docker too:
  # app:
  #   build: .
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/memorydb
  #     SPRING_DATASOURCE_USERNAME: memory
  #     SPRING_DATASOURCE_PASSWORD: memory-dev-pwd
  #     SPRING_DATA_REDIS_HOST: redis
  #     JWT_SECRET: your-secret-here
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  pgdata:
