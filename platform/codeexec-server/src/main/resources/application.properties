spring.application.name=codeexec-mcp-server
server.port=8380
spring.threads.virtual.enabled=true

spring.ai.mcp.server.name=codeexec-mcp
spring.ai.mcp.server.version=1.0.0

mcp.security.jwt-secret=${JWT_SECRET:}

# Code execution limits
codeexec.timeout-seconds=30
codeexec.max-code-size-bytes=65536
codeexec.max-output-bytes=10240
codeexec.work-dir=/tmp/codeexec
codeexec.allowed-languages=python,shell,javascript
codeexec.sandbox.mode=${CODEEXEC_SANDBOX_MODE:docker}

management.endpoints.web.exposure.include=health,info,prometheus,metrics
spring.jpa.open-in-view=false
