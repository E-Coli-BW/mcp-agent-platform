spring.application.name=model-router-mcp-server
server.port=8480
spring.threads.virtual.enabled=true

spring.ai.mcp.server.name=model-router-mcp
spring.ai.mcp.server.version=1.0.0

mcp.security.jwt-secret=${JWT_SECRET:}

# Model providers
model-router.providers.ollama.enabled=true
model-router.providers.ollama.base-url=http://localhost:11434
model-router.providers.ollama.default-model=llama3.2

model-router.providers.openai.enabled=false
model-router.providers.openai.base-url=https://api.openai.com/v1
model-router.providers.openai.api-key=${OPENAI_API_KEY:}
model-router.providers.openai.default-model=gpt-4o-mini

model-router.providers.anthropic.enabled=false
model-router.providers.anthropic.base-url=https://api.anthropic.com/v1
model-router.providers.anthropic.api-key=${ANTHROPIC_API_KEY:}
model-router.providers.anthropic.default-model=claude-sonnet-4-20250514

# MLX local provider (Apple Silicon native, see platform/llm-infra/)
# Enable when running MLX server locally: python -m serving.server
model-router.providers.mlx.enabled=false
model-router.providers.mlx.base-url=http://localhost:8600
model-router.providers.mlx.default-model=Qwen2.5-0.5B-Instruct-4bit

# Defaults
model-router.default-provider=ollama
model-router.max-tokens=4096
model-router.timeout-seconds=30

management.endpoints.web.exposure.include=health,info,prometheus,metrics
spring.jpa.open-in-view=false
