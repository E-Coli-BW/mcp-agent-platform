<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
        #header { padding: 12px 20px; background: #16213e; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
        #header h1 { font-size: 18px; color: #a8dadc; }
        #header .status { font-size: 12px; color: #888; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
        .msg.user { align-self: flex-end; background: #0f3460; color: #e8e8e8; }
        .msg.assistant { align-self: flex-start; background: #1a1a3e; border: 1px solid #333; }
        .msg.assistant code { background: #2a2a4e; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .msg.assistant pre { background: #0d0d1a; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
        .msg.tool { align-self: flex-start; background: #1a2a1a; border: 1px solid #2a4a2a; font-size: 13px; color: #8fbc8f; }
        #input-area { padding: 16px 20px; background: #16213e; border-top: 1px solid #333; display: flex; gap: 12px; }
        #input { flex: 1; padding: 12px 16px; border: 1px solid #444; border-radius: 8px; background: #1a1a2e; color: #eee; font-size: 15px; outline: none; resize: none; min-height: 44px; max-height: 120px; }
        #input:focus { border-color: #a8dadc; }
        #send { padding: 12px 24px; background: #0f3460; color: #eee; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; }
        #send:hover { background: #1a4a7a; }
        #send:disabled { background: #333; cursor: not-allowed; }
        .typing { color: #888; font-style: italic; }
    </style>
</head>
<body>
    <div id="header">
        <h1>🤖 Coding Agent</h1>
        <span class="status" id="status">Ready</span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <textarea id="input" placeholder="Ask about code... (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
        <button id="send" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const API = 'http://localhost:8500';
        const sessionId = 'web-' + Math.random().toString(36).slice(2, 10);
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const status = document.getElementById('status');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.textContent = content;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            sendBtn.disabled = true;
            status.textContent = 'Thinking...';

            addMessage('user', text);
            const assistantDiv = addMessage('assistant', '');

            try {
                const resp = await fetch(`${API}/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'coding-agent',
                        messages: [{ role: 'user', content: text }],
                        stream: true,
                        session_id: sessionId,
                    }),
                });

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed || !trimmed.startsWith('data:')) continue;
                        const data = trimmed.slice(5).trim();
                        if (data === '[DONE]') continue;

                        try {
                            const json = JSON.parse(data);
                            const content = json.choices?.[0]?.delta?.content || '';
                            if (content) {
                                // Detect tool announcements
                                if (content.includes('🔧')) {
                                    addMessage('tool', content.trim());
                                    status.textContent = content.trim();
                                } else {
                                    assistantDiv.textContent += content;
                                }
                            }
                        } catch (e) {}
                    }
                }
            } catch (err) {
                assistantDiv.textContent = '❌ Error: ' + err.message;
            }

            sendBtn.disabled = false;
            status.textContent = 'Ready';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
