spring.application.name=filesearch-mcp-server
server.port=8280
spring.threads.virtual.enabled=true

# MCP Server
spring.ai.mcp.server.name=filesearch-mcp
spring.ai.mcp.server.version=1.0.0

# Security
mcp.security.jwt-secret=${JWT_SECRET:}

# File Search
filesearch.default-root=/tmp
filesearch.max-file-size-bytes=10485760
filesearch.max-results=100
filesearch.max-lines-per-read=200
filesearch.max-tree-depth=5

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
spring.jpa.open-in-view=false
